services:
  # Note: IB Gateway container removed due to reliability issues
  # Please run TWS/Gateway on host machine and connect from app container
  
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      IBKR_HOST: host.docker.internal
      IBKR_PORT: "4002"
      IBKR_CLIENT_ID: "1"
      IBKR_TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8050"
      APP_DEBUG: "false"
      DB_PATH: "data/trading.db"
      LOG_LEVEL: "INFO"
    volumes:
      - app-data:/app/data
    # Use host network mode to access TWS/Gateway on host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - trading-net

networks:
  trading-net:
    driver: bridge

volumes:
  app-data:
