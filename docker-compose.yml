services:
  ibgateway:
    image: ghcr.io/ib-gateway/ib-gateway:latest
    restart: unless-stopped
    environment:
      IBKR_USERNAME: ${IBKR_USERNAME}
      IBKR_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: paper
      PORT: "4002"
      BIND_ADDRESS: "0.0.0.0"
    ports:
      - "4002:4002"
    networks:
      - trading-net

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      IBKR_HOST: ibgateway
      IBKR_PORT: "4002"
      IBKR_CLIENT_ID: "1"
      IBKR_TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8050"
      APP_DEBUG: "false"
      DB_PATH: "data/trading.db"
      LOG_LEVEL: "INFO"
    volumes:
      - app-data:/app/data
    depends_on:
      - ibgateway
    networks:
      - trading-net

networks:
  trading-net:
    driver: bridge

volumes:
  app-data:
