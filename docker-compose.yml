services:
  ibgateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: paper
      TWS_ACCEPT_INCOMING: "yes"
      READ_ONLY_API: "no"
      IBG_BIND_ADDRESS: "0.0.0.0"
      IBG_PORT: "4002"
      JAVA_TOOL_OPTIONS: "-Djava.security.egd=file:/dev/./urandom"
    ports:
      - "4002:4002"
    networks:
      - trading-net
    healthcheck:
      test: ["CMD", "cat", "/proc/net/tcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      IBKR_HOST: ibgateway
      IBKR_PORT: "4002"
      IBKR_CLIENT_ID: "1"
      IBKR_TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8050"
      APP_DEBUG: "false"
      DB_PATH: "data/trading.db"
      LOG_LEVEL: "INFO"
    volumes:
      - app-data:/app/data
    depends_on:
      - ibgateway
    networks:
      - trading-net

networks:
  trading-net:
    driver: bridge

volumes:
  app-data:
