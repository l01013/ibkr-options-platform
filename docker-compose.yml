services:
  ibgateway:
    image: ghcr.io/extrange/ibkr:stable
    ports:
      - "6080:6080"  # noVNC browser access
      - "8888:8888"  # API access (auto-forwards 4002)
    ulimits:
      nofile: 10000
    environment:
      USERNAME: ${USERNAME}
      PASSWORD: '${PASSWORD}'
      GATEWAY_OR_TWS: gateway
      IBC_TradingMode: paper
      IBC_ReadOnlyApi: 'no'
      IBC_ExistingSessionDetectedAction: primaryonly
      IBC_AutoRestart: 'yes'
      # Accept incoming API connections (requires manual config in noVNC first time)
    networks:
      - trading-net

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      IBKR_HOST: ibgateway
      IBKR_PORT: "8888"
      IBKR_CLIENT_ID: "1"
      IBKR_TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8050"
      APP_DEBUG: "false"
      DB_PATH: "data/trading.db"
      LOG_LEVEL: "INFO"
    volumes:
      - app-data:/app/data
    depends_on:
      - ibgateway
    networks:
      - trading-net

networks:
  trading-net:
    driver: bridge

volumes:
  app-data:
